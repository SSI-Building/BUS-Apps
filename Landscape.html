<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Landscape Maintenance Zones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: 'Prompt', sans-serif; 
            background: #EEF2F8; overflow: hidden; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        * { box-sizing: border-box; }
        
        #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F7F8FA; touch-action: manipulation; }
        
        /* แผงควบคุมสิทธิ์เข้าสู่ระบบ */
        #login-panel { position: fixed; top: 18px; left: 18px; z-index: 1500; }
        #btn-login {
            height: 48px; padding: 0 20px; border: none; border-radius: 16px;
            background: #06C755; color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,.15); display: flex; align-items: center; gap: 8px;
        }
        #user-panel {
            background: white; padding: 12px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,.15); min-width: 180px; display: none;
        }
        #user-name { font-weight: 600; font-size: 15px; color: #2d3748; }
        #user-role { font-size: 12px; color: #1677FF; margin-top: 4px; margin-bottom: 10px; font-weight: bold; }
        #btn-logout {
            width: 100%; height: 36px; border: none; background: #e74c3c;
            color: white; border-radius: 10px; cursor: pointer; font-weight: 600;
        }

        /* แผงวาดพื้นที่และแก้ไข (เฉพาะ VIP) */
        #save-panel, #edit-panel {
            position: absolute; top: 80px; left: 18px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none; z-index: 10; width: 260px;
        }
        #save-panel h3, #edit-panel h3 { margin: 0 0 10px 0; font-size: 14px; font-weight: 600; }
        #save-panel input, #save-panel select { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
        #save-panel button, #edit-panel button { width: 48%; padding: 10px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-family: inherit; }
        .btn-save { background: #1677FF; color: white; }
        .btn-cancel { background: #e74c3c; color: white; }

        /* Floating Action Buttons */
        .fab-container {
            position: fixed; right: 18px; bottom: 28px; display: flex; flex-direction: column; gap: 15px; z-index: 500; transition: .25s;
        }
        .fab-hidden { display: none !important; }
        .fab {
            width: 62px; height: 62px; border-radius: 22px; border: none;
            background: rgba(255, 255, 255, .92); backdrop-filter: blur(18px);
            box-shadow: 0 8px 30px rgba(0,0,0,.18); font-size: 22px; color: #1677ff;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: .2s;
        }
        .fab:active { transform: scale(.93); }
        .fab-toggle-view { background: #1677FF; color: white; position: relative; }
        .fab-toggle-view .badge {
            position: absolute; top: -2px; right: -2px; background: #e74c3c;
            color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; font-weight: bold;
        }
        #draw-mode-btn { background: #2ecc71; color: white; display: none; } /* ซ่อนไว้ก่อน รอเช็กสิทธิ์ VIP */

        /* Mobile Bottom Sheet */
        .mobile-bottom-sheet {
            position: fixed; left: 0; right: 0; bottom: 0; height: 52vh;
            display: none; flex-direction: column; background: rgba(255, 255, 255, .96);
            backdrop-filter: blur(25px); border-radius: 28px 28px 0 0;
            box-shadow: 0 -15px 40px rgba(0,0,0,.18); overflow: hidden; z-index: 999;
        }
        .sheet-handle { width: 100%; height: 32px; display: flex; justify-content: center; align-items: center; cursor: ns-resize; }
        .sheet-line { width: 70px; height: 6px; border-radius: 30px; background: #D6D8DC; }
        .sheet-header { padding: 4px 24px 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #F0F2F5; }
        .sheet-title { font-size: 18px; font-weight: 700; color: #2d3748; }
        .btn-close-sheet { background: #F0F2F5; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 22px; color: #666; cursor: pointer; }
        .sheet-content-wrapper { overflow-y: auto; padding: 12px 24px 24px 24px; flex: 1; }
        
        /* Table Style */
        #data-table { width: 100%; border-collapse: collapse; font-size: 15px; }
        #data-table th { padding: 12px 10px; text-align: left; background: #fff; color: #888; border-bottom: 2px solid #f9f9f9; }
        #data-table td { padding: 15px 10px; border-bottom: 1px solid #f1f1f1; color: #333; }
        #data-table tr { transition: .2s; cursor: pointer; }
        #data-table tr:not(.selected-row):active { background: #f7fafc; }
        #data-table tr.selected-row { background: #EAF3FF !important; border-left: 5px solid #1677FF; }
        .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
        
        .btn-table-report { background: #EAF3FF; border: none; color: #1677FF; font-size: 16px; cursor: pointer; padding: 8px 12px; border-radius: 10px; transition: .2s; }
        .btn-table-report:active { transform: scale(0.9); background: #1677FF; color: white; }

        /* Form Style */
        .mobile-report-form { display: flex; flex-direction: column; gap: 12px; padding-top: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #4a5568; }
        .form-group input { width: 100%; padding: 12px; font-size: 15px; border: 1px solid #cbd5e0; border-radius: 12px; outline: none; font-family: inherit; }
        .form-group input:focus { border-color: #1677FF; }
        
        .btn-update-main {
            width: 100%; margin-top: 10px; height: 52px; border: none; border-radius: 15px;
            background: #1677FF; color: white; font-size: 16px; font-weight: 600;
            box-shadow: 0 10px 25px rgba(22,119,255,.25); cursor: pointer; transition: .2s; font-family: inherit;
        }
        .btn-update-main:active { transform: scale(.97); }

        /* ซ่อน Popup พื้นฐานของ MapLibre */
        .maplibregl-popup { display: none !important; }
    </style>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
</head>
<body>

<div id="login-panel">
    <button id="btn-login">
        <i class="fa-brands fa-line"></i> เข้าสู่ระบบด้วย LINE
    </button>
    <div id="user-panel">
        <div id="user-name">กำลังโหลดข้อมูล...</div>
        <div id="user-role">Guest</div>
        <button id="btn-logout">ออกจากระบบ</button>
    </div>
</div>

<div id="map"></div>

<div class="fab-container" id="fab-box">
    <button class="fab" id="draw-mode-btn" title="วาดแปลงพื้นที่ใหม่">
        <i class="fas fa-plus"></i>
    </button>
    <button class="fab fab-toggle-view" id="view-mode-btn" title="สลับมุมมองสี">
        <i class="fas fa-layer-group"></i>
        <span class="badge" id="view-badge">ทีม</span>
    </button>
    <button class="fab fab-table" id="table-open-btn" title="ตารางข้อมูล">
        <i class="fas fa-list-ul"></i>
    </button>
</div>

<div id="table-sheet" class="mobile-bottom-sheet">
    <div class="sheet-handle" id="table-drag-handle"><div class="sheet-line"></div></div>
    <div class="sheet-header">
        <span class="sheet-title">Landscape Maintenance Zones</span>
        <button id="table-close-btn" class="btn-close-sheet">&times;</button>
    </div>
    <div id="data-table-wrapper" class="sheet-content-wrapper">
        <table id="data-table">
            <thead>
                <tr id="table-header-row">
                    <th>ชื่อพื้นที่โซน</th>
                    <th id="th-dynamic-status">ผู้รับผิดชอบ</th>
                </tr>
            </thead>
            <tbody id="table-tbody">
                <tr><td colspan="2" style="text-align:center; color:#999; padding:20px;">กำลังดึงพิกัดแผนที่...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="form-sheet" class="mobile-bottom-sheet" style="height: auto; max-height: 75vh;">
    <div class="sheet-handle" id="form-drag-handle"><div class="sheet-line"></div></div>
    <div class="sheet-header">
        <span class="sheet-title" id="form-sheet-title">อัปเดตสถานะงาน</span>
        <button id="form-close-btn" class="btn-close-sheet">&times;</button>
    </div>
    <div class="sheet-content-wrapper">
        <div class="mobile-report-form">
            <div class="form-group">
                <label for="input-percent">งานที่ตัดเสร็จจริงหน้างาน ณ วันนี้ (%)</label>
                <input type="number" id="input-percent" placeholder="ระบุตัวเลข 0 - 100" min="0" max="100" pattern="\d*">
            </div>
            <div class="form-group">
                <label for="input-name">ชื่อหัวหน้างานผู้รายงาน</label>
                <input type="text" id="input-name" readonly>
            </div>
            <button class="btn-update-main" id="btn-submit-data">บันทึกส่งรายงานตัดหญ้า</button>
        </div>
    </div>
</div>

<div id="save-panel">
    <h3 id="panel-title">บันทึกพื้นที่ใหม่</h3>
    <input type="text" id="zone-name" placeholder="ชื่อโซน / ชื่อพื้นที่" />
    <label style="font-size:12px; font-weight:600;">ทีมทำความสะอาด:</label>
    <select id="zone-color">
        <option value="#2ecc71">ทีมสีเขียว</option>
        <option value="#f1c40f">ทีมสีเหลือง</option>
    </select>
    <div style="display: flex; justify-content: space-between; margin-top:10px;">
        <button class="btn-save" id="btn-save-zone">บันทึก</button>
        <button class="btn-cancel" id="btn-cancel-zone">ยกเลิก</button>
    </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZ9MH7fONCkaqgmqWLOM8yAoRm2e4j82x79Lwhpju9k3gz1Uzi9Y4s4ibhwv_bhCnX/exec"; 
const LIFF_ID = "2007956727-tmpCUfRZ";

let currentUser = null;
let isAdmin = false; // VIP สิทธิ์แอดมิน
let isLogin = false;

const targetLngLat = [99.535692, 11.231666];
const map = new maplibregl.Map({
    container: 'map',
    style: {
        version: 8,
        sources: { satellite: { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'], tileSize: 256 } },
        layers: [{ id: 'satellite', type: 'raster', source: 'satellite' }]
    },
    center: [targetLngLat[0] - (-0.0010), targetLngLat[1] - 0.0010],
    zoom: 15.58, bearing: -45.6, maxZoom: 21
});

map.touchZoomRotate.enable({ around: "center" });
map.dragPan.enable();
map.dragRotate.disable();
map.doubleClickZoom.disable();

// เครื่องมือวาด MapboxDraw 
const draw = new MapboxDraw({ displayControlsDefault: false, controls: {} });
map.addControl(draw, 'top-right');

let currentFeature = null;
let totalZonesCount = 0;
let globalZonesArray = [];
let viewMode = 'team'; 
let selectedZone = null;
let isBusy = false; 

// เฝ้าดูการวาดแผนที่
map.on('draw.create', (e) => {
    const feats = draw.getAll();
    if (feats.features.length > 0) {
        currentFeature = feats.features[feats.features.length - 1];
        document.getElementById('save-panel').style.display = 'block';
    }
});

document.getElementById('btn-cancel-zone').onclick = () => {
    if(currentFeature) draw.delete(currentFeature.id);
    document.getElementById('save-panel').style.display = 'none';
};

document.getElementById('btn-save-zone').onclick = async () => {
    const name = document.getElementById('zone-name').value;
    const color = document.getElementById('zone-color').value;
    if(!name || !currentFeature) { alert("กรุณากรอกชื่อพื้นที่"); return; }
    
    const areaM2 = turf.area(currentFeature);
    const btn = document.getElementById('btn-save-zone');
    btn.disabled = true; btn.innerText = "กำลังบันทึก...";

    await sendData({
        action: "saveZone", zone_name: name,
        coordinates_data: JSON.stringify(currentFeature.geometry.coordinates[0]),
        area_size: areaM2.toFixed(2) + " ตร.ม.", color: color
    });
};

async function sendData(payload) {
    try {
        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
        const res = await response.json();
        if(res.status === "success") location.reload();
    } catch (e) { alert("เชื่อมต่อผิดพลาด ไม่สามารถส่งข้อมูลได้"); }
}

// ควบคุมการลากยืด Bottom Sheet
const tableSheet = document.getElementById('table-sheet');
const formSheet = document.getElementById('form-sheet');

function loadSavedHeight(sheetElem, defaultHeight) {
    const savedHeight = localStorage.getItem(sheetElem.id + '_height');
    sheetElem.style.height = savedHeight ? savedHeight : defaultHeight;
}

function setupDragLogic(sheetElem, handleElem) {
    let isDragging = false;
    const startDrag = () => { isDragging = true; };
    const onDrag = (e) => {
        if (!isDragging) return;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let newHeight = window.innerHeight - clientY;
        if (newHeight >= 100 && newHeight <= window.innerHeight * 0.85) {
            sheetElem.style.height = newHeight + 'px';
        }
    };
    const stopDrag = () => { 
        if (!isDragging) return;
        isDragging = false; 
        localStorage.setItem(sheetElem.id + '_height', sheetElem.style.height);
    };

    handleElem.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', stopDrag);
    handleElem.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', onDrag);
    window.addEventListener('touchend', stopDrag);
}

setupDragLogic(tableSheet, document.getElementById('table-drag-handle'));
setupDragLogic(formSheet, document.getElementById('form-drag-handle'));

// เปิด-ปิด Sheet แผงข้อมูลต่างๆ
document.getElementById('table-open-btn').onclick = () => {
    formSheet.style.display = 'none';
    tableSheet.style.display = 'flex';
    loadSavedHeight(tableSheet, '52vh'); 
    document.getElementById('fab-box').classList.add('fab-hidden');
};
document.getElementById('table-close-btn').onclick = () => {
    tableSheet.style.display = 'none';
    document.getElementById('fab-box').classList.remove('fab-hidden');
    resetHighlights();
};
document.getElementById('form-close-btn').onclick = () => {
    formSheet.style.display = 'none';
    document.getElementById('fab-box').classList.remove('fab-hidden');
    resetHighlights();
};

function getGrassColor(pct) {
    if (pct <= 40) return '#2ecc71'; // หญ้าสั้น (เขียว)
    if (pct <= 75) return '#f1c40f'; // หญ้าปานกลาง (เหลือง)
    return '#e74c3c'; // หญ้ายาว (แดง)
}

function updateColors() {
    globalZonesArray.forEach((z, i) => {
        if(map.getLayer(`layer-zone-${i}`)) {
            const c = (viewMode === 'team') ? (z.Color || '#2ecc71') : getGrassColor(z.current_grass_percentage);
            map.setPaintProperty(`layer-zone-${i}`, 'fill-color', c);
            map.setPaintProperty(`layer-zone-${i}-stroke`, 'line-color', c);
        }
    });
}

// วาดตารางข้อมูลรองรับระบบแยกสิทธิ์ (Guest, User, VIP)
function renderTable() {
    const tbody = document.getElementById("table-tbody");
    const headerRow = document.getElementById("table-header-row");
    const th = document.getElementById("th-dynamic-status");

    if (isAdmin) {
        headerRow.innerHTML = `<th>ชื่อพื้นที่โซน</th><th id="th-dynamic-status"></th><th style="text-align:right;">รายงาน</th>`;
    } else {
        headerRow.innerHTML = `<th>ชื่อพื้นที่โซน</th><th id="th-dynamic-status"></th>`;
    }

    const currentTh = document.getElementById("th-dynamic-status");
    if(viewMode === "team") {
        currentTh.innerText = "ผู้รับผิดชอบ";
        tbody.innerHTML = globalZonesArray.map((z, i) => `
            <tr id="tr-zone-${i}" onclick="focusOnZoneFromTable(${i}, this)">
                <td><span class="color-dot" style="background:${z.Color || '#2ecc71'}"></span>${z.zone_name}</td>
                <td>${z.Color === "#f1c40f" ? "ทีมสีเหลือง" : "ทีมสีเขียว"}</td>
                ${isAdmin ? `<td style="text-align:right;"><button class="btn-table-report" onclick="event.stopPropagation(); triggerReportFromTable(${i})"><i class="fas fa-file-pen"></i></button></td>` : ""}
            </tr>
        `).join("");
    } else {
        currentTh.innerText = "ความยาวหญ้า";
        tbody.innerHTML = globalZonesArray.map((z, i) => `
            <tr id="tr-zone-${i}" onclick="focusOnZoneFromTable(${i}, this)">
                <td><span class="color-dot" style="background:${getGrassColor(z.current_grass_percentage)}"></span>${z.zone_name}</td>
                <td style="font-weight:bold; color:${getGrassColor(z.current_grass_percentage)}">${z.current_grass_percentage}%</td>
                ${isAdmin ? `<td style="text-align:right;"><button class="btn-table-report" onclick="event.stopPropagation(); triggerReportFromTable(${i})"><i class="fas fa-file-pen"></i></button></td>` : ""}
            </tr>
        `).join("");
    }
}

document.getElementById('view-mode-btn').onclick = () => {
    viewMode = (viewMode === 'team') ? 'grass' : 'team';
    document.getElementById('view-badge').innerText = viewMode === 'team' ? "ทีม" : "หญ้า";
    document.getElementById('view-mode-btn').style.background = viewMode === 'team' ? "#1677FF" : "linear-gradient(135deg, #e74c3c, #c0392b)";
    updateColors(); renderTable(); resetHighlights();
    formSheet.style.display = 'none';
};

function focusOnZoneFromTable(index, element) {
    document.querySelectorAll('#data-table tr').forEach(r => r.classList.remove('selected-row'));
    element.classList.add('selected-row');

    const zone = globalZonesArray[index];
    const bounds = new maplibregl.LngLatBounds();
    zone.coords.forEach(c => bounds.extend(c));
    
    map.fitBounds(bounds, { padding: 40, duration: 750, bearing: map.getBearing() });
    
    for(let i=0; i<totalZonesCount; i++) {
        map.setPaintProperty(`layer-zone-${i}`, 'fill-opacity', i === index ? 0.85 : 0.15);
        map.setPaintProperty(`layer-zone-${i}-stroke`, 'line-width', i === index ? 5 : 2);
    }
}

function activateReportingForm(zone, index) {
    selectedZone = zone;
    tableSheet.style.display = 'none';
    
    document.getElementById('form-sheet-title').innerText = `รายงานผล: ${zone.zone_name}`;
    document.getElementById('input-percent').value = '';
    formSheet.style.display = 'flex';
    
    loadSavedHeight(formSheet, 'auto');
    document.getElementById('fab-box').classList.add('fab-hidden');

    const bounds = new maplibregl.LngLatBounds();
    zone.coords.forEach(c => bounds.extend(c));
    map.fitBounds(bounds, { padding: 40, duration: 750, bearing: map.getBearing() });

    for(let i=0; i<totalZonesCount; i++) {
        map.setPaintProperty(`layer-zone-${i}`, 'fill-opacity', i === index ? 0.85 : 0.15);
        map.setPaintProperty(`layer-zone-${i}-stroke`, 'line-width', i === index ? 5 : 2);
    }
}

function triggerReportFromTable(index){
    if(!isAdmin){ alert("เฉพาะผู้ดูแลระบบ (VIP) เท่านั้น"); return; }
    activateReportingForm(globalZonesArray[index], index);
}

function resetHighlights() {
    for(let i=0; i<totalZonesCount; i++) {
        if(map.getLayer(`layer-zone-${i}`)) {
            map.setPaintProperty(`layer-zone-${i}`, 'fill-opacity', 0.5);
            map.setPaintProperty(`layer-zone-${i}-stroke`, 'line-width', 2);
        }
    }
    document.querySelectorAll('#data-table tr').forEach(r => r.classList.remove('selected-row'));
}

document.getElementById('btn-submit-data').onclick = async () => {
    if(!isAdmin){ alert("ไม่มีสิทธิ์รายงานผลข้อมูล"); return; }
    if(!selectedZone) return;
    
    const pct = document.getElementById('input-percent').value;
    const name = document.getElementById('input-name').value;
    if(!pct || pct < 0 || pct > 100 || !name) { alert("ข้อมูลไม่ถูกต้อง กรุณาระบุค่า 0 - 100"); return; }
    
    const btn = document.getElementById('btn-submit-data');
    btn.disabled = true; btn.innerText = "กำลังบันทึกข้อมูล...";
    
    await sendData({
        action: "reportProgress", zone_id: selectedZone.zone_id,
        zone_name: selectedZone.zone_name, work_percentage: pct, worker_name: name
    });
};

function handlePolygonClick(lngLat) {
    if(isBusy || draw.getMode() === 'draw_polygon') return;
    isBusy = true; 

    let foundIndex = -1;
    const point = turf.point([lngLat.lng, lngLat.lat]);

    for(let i = 0; i < globalZonesArray.length; i++) {
        const zone = globalZonesArray[i];
        if(zone.turfBuffered && turf.booleanPointInPolygon(point, zone.turfBuffered)) {
            foundIndex = i;
            break;
        }
    }

    if(foundIndex === -1) {
        resetHighlights();
        formSheet.style.display = "none";
        tableSheet.style.display = "none";
        document.getElementById("fab-box").classList.remove("fab-hidden");
        isBusy = false;
        return;
    }

    formSheet.style.display = "none";
    tableSheet.style.display = "flex";
    loadSavedHeight(tableSheet, "52vh");
    document.getElementById("fab-box").classList.add("fab-hidden");

    document.querySelectorAll("#data-table tr").forEach(r => r.classList.remove("selected-row"));

    for(let i=0; i<totalZonesCount; i++) {
        map.setPaintProperty(`layer-zone-${i}`, "fill-opacity", i === foundIndex ? 0.85 : 0.15);
        map.setPaintProperty(`layer-zone-${i}-stroke", "line-width`, i === foundIndex ? 5 : 2);
    }

    const row = document.getElementById(`tr-zone-${foundIndex}`);
    if(row) {
        row.classList.add("selected-row");
        row.scrollIntoView({ behavior: "smooth", block: "start" });
    }
    setTimeout(() => { isBusy = false; }, 300);
}

let pointerStartX = 0; let pointerStartY = 0;
map.getCanvas().addEventListener("pointerdown", (e) => { pointerStartX = e.clientX; pointerStartY = e.clientY; });
map.getCanvas().addEventListener("pointerup", (e) => {
    if (isBusy || draw.getMode() === 'draw_polygon') return;
    if (Math.abs(e.clientX - pointerStartX) > 6 || Math.abs(e.clientY - pointerStartY) > 6) return;

    const rect = map.getCanvas().getBoundingClientRect();
    const point = [e.clientX - rect.left, e.clientY - rect.top];
    const lngLat = map.unproject(point);
    handlePolygonClick(lngLat);
});

async function fetchWithRetry(url, retries = 3, delay = 2000) {
    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Network status invalid");
            return await response.json();
        } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(res => setTimeout(res, delay));
        }
    }
}

// โหลดฐานข้อมูลหลักและแผนที่เมื่อเปิดเว็บ
map.on('load', async () => {
    try {
        // โหลดข้อมูลแผนที่ก่อนเสมอเพื่อให้โหมด Guest ส่องดูได้ทันที
        const zones = await fetchWithRetry(`${WEB_APP_URL}?action=getZones`);
        globalZonesArray = zones; totalZonesCount = zones.length;
        
        zones.forEach((zone) => {
            try {
                zone.coords = JSON.parse(zone.coordinates_data);
                zone.turfPolygon = turf.polygon([zone.coords]);
                zone.turfBuffered = turf.buffer(zone.turfPolygon, 8, { units: "meters" });
            } catch(jsonErr) { console.error("พิกัดโซนนี้ผิดพลาด:", jsonErr); }
        });
        
        renderTable();
        
        zones.forEach((zone, index) => {
            if(!zone.coords) return;
            const srcId = `source-zone-${index}`;
            const lyrId = `layer-zone-${index}`;
            const c = (viewMode === 'team') ? (zone.Color || '#2ecc71') : getGrassColor(zone.current_grass_percentage);

            map.addSource(srcId, { 'type': 'geojson', 'data': { 'type': 'Feature', 'geometry': { 'type': 'Polygon', 'coordinates': [zone.coords] } } });
            map.addLayer({ 'id': lyrId, 'type': 'fill', 'source': srcId, 'paint': { 'fill-color': c, 'fill-opacity': 0.5 } });
            map.addLayer({ 'id': `${lyrId}-stroke`, 'type': 'line', 'source': srcId, 'paint': { 'line-color': c, 'line-width': 2 } });
        });

        // หลังจากแผนที่เสร็จแล้ว ค่อยเริ่มโหลดสิทธิ์การเข้าสู่ระบบ LINE LIFF ตาม Flow
        await initializeLiff();

    } catch (err) { 
        alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ Google Sheet ได้ กรุณารีเฟรชใหม่อีกครั้งครับ");
    }
});

async function initializeLiff(){
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            console.log("Guest Mode Active");
            updateUIByRole(); // ให้แสดงผลแบบสิทธิ์ทั่วไป
            return;
        }

        const profile = await liff.getProfile();
        isLogin = true;
        currentUser = { lineUserId: profile.userId, displayName: profile.displayName };

        document.getElementById("btn-login").style.display = "none";
        document.getElementById("user-panel").style.display = "block";
        document.getElementById("user-name").innerHTML = currentUser.displayName;
        document.getElementById("user-role").innerHTML = "กำลังตรวจสอบสิทธิ์...";

        await checkPermission();
    } catch(err) { console.log("LIFF Error:", err); }
}

async function checkPermission(){
    try {
        const res = await fetch(`${WEB_APP_URL}?action=checkUser&lineUserId=${currentUser.lineUserId}`);
        const data = await res.json();

        // 1. ยังไม่มีในฐานข้อมูล -> ไปฟอร์มลงทะเบียน
        if(data.status === "NOT_FOUND"){
            registerUser();
            return;
        }

        // 2. พบข้อมูลพนักงานแล้ว -> บันทึกข้อมูลและประมวลผลสิทธิ์
        currentUser.fullname = data.fullname;
        currentUser.role = data.role;
        isAdmin = (data.role === "VIP"); // กำหนดความเป็น VIP

        document.getElementById("user-role").innerHTML = `สิทธิ์: ${data.role}`;
        document.getElementById("input-name").value = data.fullname;

        // อัปเดต UI หน้าเว็บและตารางให้เปลี่ยนไปตามสิทธิ์ที่ได้มาใหม่
        updateUIByRole();
        renderTable();

    } catch(e) {
        document.getElementById("user-role").innerHTML = "เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์";
    }
}

// ฟังก์ชันศูนย์กลางจัดการสิทธิ์หน้าเว็บตาม Flowchart
function updateUIByRole() {
    const drawModeBtn = document.getElementById('draw-mode-btn');
    
    if (isLogin && isAdmin) {
        // --- กรณีเป็น VIP (แอดมินแก้ไขได้หมด) ---
        drawModeBtn.style.display = 'flex'; // แสดงปุ่มวาดพื้นที่
        
        // ผูกการวาดของปุ่ม
        drawModeBtn.onclick = () => {
            resetHighlights();
            tableSheet.style.display = 'none';
            formSheet.style.display = 'none';
            draw.changeMode('draw_polygon'); // สั่ง MapboxDraw เริ่มทำงานคัดพิกัดแปลงหญ้า
        };
    } else {
        // --- กรณีเป็น User ทั่วไป หรือ Guest ---
        drawModeBtn.style.display = 'none'; // ซ่อนปุ่มวาดพื้นที่ทิ้งทั้งหมด
        draw.deleteAll(); // มั่นใจว่าล้างฟังก์ชันเขียนเส้นออกไปชัวร์ๆ
    }
}

async function registerUser(){
    const empid = prompt("กรอกรหัสพนักงานของคุณ:");
    if(!empid) return;
    const fullname = prompt("ระบุ ชื่อ-นามสกุล จริง:");
    if(!fullname) return;
    const position = prompt("ระบุ ตำแหน่งงาน:");
    if(!position) return;

    await fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "registerUser", empid: empid, fullname: fullname, position: position, lineUserId: currentUser.lineUserId
        })
    });

    alert("ลงทะเบียนสำเร็จ! กรุณาติดต่อผู้ดูแลระบบ (VIP) เพื่อพิจารณาอนุมัติเปิดสิทธิ์ครับ");
    location.reload();
}

document.getElementById("btn-login").onclick = () => { liff.login({ redirectUri: window.location.href }); }
document.getElementById("btn-logout").onclick = () => { liff.logout(); location.reload(); }
