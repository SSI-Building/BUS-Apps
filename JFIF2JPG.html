<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมแปลงไฟล์ JFIF เป็น JPG (หลายไฟล์)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .upload-box {
            border: 2px dashed #cbd5e1;
            padding: 40px 20px;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f8fafc;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-box:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        input[type="file"] {
            display: none;
        }
        .icon {
            font-size: 45px;
            color: #64748b;
            margin-bottom: 10px;
        }
        /* ส่วนแสดงรายการไฟล์ที่แปลงแล้ว */
        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            text-align: left;
        }
        .file-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .file-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            background: #f1f5f9;
        }
        .file-name {
            font-size: 14px;
            color: #334155;
            margin: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
        }
        .btn-download {
            background-color: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>แปลงไฟล์ JFIF เป็น JPG (เลือกได้หลายไฟล์)</h1>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <div class="icon">Files 📁</div>
        <p style="margin: 0; color: #64748b; font-weight: 500;">คลิกเพื่อเลือกไฟล์ .jfif (เลือกพร้อมกันได้หลายไฟล์)</p>
        <input type="file" id="fileInput" accept=".jfif, .jpeg, .jpg" multiple>
    </div>

    <div class="file-list" id="fileList"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    fileInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        // ล้างรายการเก่าออกก่อน ถ้าอยากให้สะสมรูปไปเรื่อยๆ ให้ลบไลนนี้ออกครับ
        fileList.innerHTML = ''; 

        // วนลูปจัดการทีละไฟล์
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                
                img.onload = function() {
                    // สร้าง Canvas เพื่อแปลงรูป
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // แปลงเป็น JPG Data URL
                    const jpgUrl = canvas.toDataURL('image/jpeg', 0.9);
                    
                    // หาชื่อไฟล์เดิมเพื่อเปลี่ยนนามสกุล
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                    const newFileName = originalName + '.jpg';

                    // สร้างการ์ดแสดงผล (UI Card)
                    createFileCard(jpgUrl, newFileName);
                }
                
                img.src = event.target.result;
            }
            
            reader.readAsDataURL(file);
        });
    });

    // ฟังก์ชันสำหรับสร้าง HTML Card ของแต่ละรูป
    function createFileCard(imgSrc, fileName) {
        const card = document.createElement('div');
        card.className = 'file-card';

        card.innerHTML = `
            <img src="${imgSrc}" alt="${fileName}">
            <div class="file-name" title="${fileName}">${fileName}</div>
            <a href="${imgSrc}" download="${fileName}" class="btn-download">ดาวน์โหลด</a>
        `;

        fileList.appendChild(card);
    }
</script>

</body>
</html>
