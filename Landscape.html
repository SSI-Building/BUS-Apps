<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Map-WasteCheck (LINE LIFF - Safe Lock)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
<link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" type="text/css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
    body { 
        margin: 0; padding: 0; font-family: 'Prompt', sans-serif; 
        background: #EEF2F8; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    * { box-sizing: border-box; }
    #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #F7F8FA; }
    
    #zoom-indicator {
        position: absolute; top: 18px; left: 18px; padding: 10px 16px; border-radius: 20px;
        background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(18px);
        font-size: 13px; font-weight: 600; box-shadow: 0 8px 20px rgba(0,0,0,0.15); z-index: 10;
    }

    /* กล่องโหลดดิ้งบังหน้าจอระหว่างกำลังตรวจสอบสิทธิ์ผ่านไลน์ */
    #loading-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #EEF2F8;
        display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; gap: 15px;
    }
    .spinner { width: 40px; height: 40px; border: 4px solid #cbd5e0; border-top-color: #1677FF; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #save-panel, #edit-panel {
        position: absolute; top: 80px; left: 18px;
        background: rgba(255, 255, 255, 0.95); padding: 15px;
        border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; z-index: 10; width: 260px;
    }
    #edit-panel { background: #34495e; color: white; }
    #save-panel h3, #edit-panel h3 { margin: 0 0 10px 0; font-size: 14px; font-weight: 600; }
    #save-panel input, #save-panel select { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
    #save-panel button, #edit-panel button { width: 48%; padding: 10px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }

    .fab-container { position: fixed; right: 18px; bottom: 28px; display: flex; flex-direction: column; gap: 15px; z-index: 500; }
    .fab {
        width: 62px; height: 62px; border-radius: 22px; border: none;
        background: rgba(255, 255, 255, .92); backdrop-filter: blur(18px);
        box-shadow: 0 8px 30px rgba(0,0,0,.18); font-size: 22px; color: #1677ff;
        display: flex; align-items: center; justify-content: center; cursor: pointer; transition: .2s;
    }
    .fab:active { transform: scale(.93); }
    .fab-toggle-view { background: #1677FF; color: white; position: relative; }
    .fab-toggle-view .badge { position: absolute; top: -2px; right: -2px; background: #e74c3c; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

    .mobile-bottom-sheet {
        position: fixed; left: 0; right: 0; bottom: 0; height: 52vh;
        display: none; flex-direction: column; background: rgba(255, 255, 255, .96);
        backdrop-filter: blur(25px); border-radius: 28px 28px 0 0; box-shadow: 0 -15px 40px rgba(0,0,0,.18); overflow: hidden; z-index: 999;
    }
    .sheet-handle { width: 100%; height: 32px; display: flex; justify-content: center; align-items: center; cursor: ns-resize; }
    .sheet-line { width: 70px; height: 6px; border-radius: 30px; background: #D6D8DC; }
    .sheet-header { padding: 4px 24px 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #F0F2F5; }
    .sheet-title { font-size: 18px; font-weight: 700; color: #2d3748; }
    .btn-close-sheet { background: #F0F2F5; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 22px; color: #666; cursor: pointer; }
    .sheet-content-wrapper { overflow-y: auto; padding: 12px 24px 24px 24px; flex: 1; }
    
    #data-table { width: 100%; border-collapse: collapse; }
    #data-table th { padding: 14px 10px; text-align: left; color: #888; font-size: 13px; border-bottom: 2px solid #F0F2F5; }
    #data-table td { padding: 18px 10px; font-size: 15px; border-bottom: 1px solid #F0F2F5; color: #2d3748; }
    #data-table tr.selected-row { background: #EAF3FF !important; border-left: 5px solid #1677FF; }
    .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .btn-table-report { background: #EAF3FF; border: none; color: #1677FF; font-size: 16px; cursor: pointer; padding: 8px 12px; border-radius: 10px; }

    .maplibregl-popup-content { padding: 0 !important; border-radius: 22px !important; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.28) !important; background: white; }
    .custom-popup { width: 250px; padding: 18px; background: white; position: relative; }
    .popup-title { font-size: 16px; font-weight: 700; color: #2d3748; margin: 0 0 6px 0; }
    .popup-grass-text { font-size: 13px; color: #666; }
    .popup-grass-badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-weight: bold; font-size: 12px; margin-left: 5px; }
    
    .btn-popup-edit-trigger {
        position: absolute; right: 14px; bottom: 14px; background: #EAF3FF; color: #1677FF;
        border: none; width: 38px; height: 38px; border-radius: 12px; font-size: 15px; display: flex; align-items: center; justify-content: center;
    }

    .mobile-report-form { display: flex; flex-direction: column; gap: 12px; padding-top: 15px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #4a5568; }
    .form-group input { width: 100%; padding: 12px; font-size: 15px; border: 1px solid #cbd5e0; border-radius: 12px; outline: none; }
    .btn-update-main { width: 100%; margin-top: 10px; height: 52px; border: none; border-radius: 15px; background: #1677FF; color: white; font-size: 16px; font-weight: 600; }
</style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <span style="font-weight: 500; color: #4a5568;" id="loading-text">กำลังยืนยันตัวตนผ่าน LINE...</span>
</div>

<div id="map"></div>
<div id="zoom-indicator">Zoom: 15.58</div>

<div class="fab-container" id="fab-box">
    <button class="fab fab-toggle-view" id="view-mode-btn">
        <i class="fas fa-layer-group"></i>
        <span class="badge" id="view-badge">ทีม</span>
    </button>
    <button class="fab fab-table" id="table-open-btn"><i class="fas fa-list-ul"></i></button>
</div>

<div id="table-sheet" class="mobile-bottom-sheet">
    <div class="sheet-handle" id="table-drag-handle"><div class="sheet-line"></div></div>
    <div class="sheet-header">
        <span class="sheet-title">รายชื่อพื้นที่ดิน</span>
        <button id="table-close-btn" class="btn-close-sheet">&times;</button>
    </div>
    <div id="data-table-wrapper" class="sheet-content-wrapper">
        <table id="data-table">
            <thead>
                <tr>
                    <th>ชื่อพื้นที่โซน</th>
                    <th id="th-dynamic-status">ผู้รับผิดชอบ</th>
                    <th style="text-align: right;" class="vip-only-element">รายงาน</th>
                </tr>
            </thead>
            <tbody id="table-tbody"></tbody>
        </table>
    </div>
</div>

<div id="form-sheet" class="mobile-bottom-sheet" style="height: auto; max-height: 75vh;">
    <div class="sheet-handle" id="form-drag-handle"><div class="sheet-line"></div></div>
    <div class="sheet-header">
        <span class="sheet-title" id="form-sheet-title">อัปเดตสถานะงาน</span>
        <button id="form-close-btn" class="btn-close-sheet">&times;</button>
    </div>
    <div class="sheet-content-wrapper">
        <div class="mobile-report-form">
            <div class="form-group">
                <label for="input-percent">งานที่ตัดเสร็จจริงหน้างาน ณ วันนี้ (%)</label>
                <input type="number" id="input-percent" placeholder="ระบุตัวเลข 0 - 100" min="0" max="100">
            </div>
            <div class="form-group">
                <label for="input-name">ชื่อหัวหน้างานผู้รายงาน</label>
                <input type="text" id="input-name" readonly> </div>
            <button class="btn-update-main" id="btn-submit-data">บันทึกส่งรายงานตัดหญ้า</button>
        </div>
    </div>
</div>

<script src="https://static.liff.line.me/liff/edge/2/sdk.js"></script>
<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
const LIFF_ID = "2007956727-tmpCUfRZ";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZ9MH7fONCkaqgmqWLOM8yAoRm2e4j82x79Lwhpju9k3gz1Uzi9Y4s4ibhwv_bhCnX/exec"; 

let currentUserRole = "Staff"; // ค่าเริ่มต้นจำกัดสิทธิ์พนักงานธรรมดาไว้ก่อน
let currentUserName = "";
let globalZonesArray = [];
let totalZonesCount = 0;
let viewMode = 'team';
let selectedZone = null;
let activePopup = null;

// ตั้งค่าแผนที่เริ่มต้น
const map = new maplibregl.Map({
    container: 'map',
    style: {
        version: 8,
        sources: { satellite: { type: 'raster', tiles: ['https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'], tileSize: 256 } },
        layers: [{ id: 'satellite', type: 'raster', source: 'satellite' }]
    },
    center: [99.536692, 11.232666], zoom: 15.58, bearing: -45.6
});

// ==========================================================
// 🌟 ฟังก์ชันเริ่มต้นระบบ และตรวจสอบสิทธิ์ผ่าน LINE LIFF 🌟
// ==========================================================
async function initLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
            liff.login(); // บังคับลงชื่อเข้าใช้งานถ้าเปิดนอกแอปไลน์
            return;
        }
        
        // ดึงโปรไฟล์พนักงานจาก LINE
        const profile = await liff.getProfile();
        const userId = profile.userId;
        
        document.getElementById('loading-text').innerText = "กำลังตรวจเช็คระดับสิทธิ์ VIP...";
        
        // ส่ง userId ไปเช็คกับตาราง List Name หลังบ้าน
        const response = await fetch(`${WEB_APP_URL}?action=checkRole&userId=${userId}`);
        const access = await response.json();
        
        currentUserRole = access.role; // จะได้ค่าเป็น "VIP" หรือ "Staff"
        currentUserName = access.name !== "ไม่ระบุชื่อ" ? access.name : profile.displayName;
        document.getElementById('input-name').value = currentUserName; // ล็อกชื่อใส่ฟอร์มออโต้

        // ปิดหน้าจอโหลดดิ้งเพื่อเข้าสู่แผนที่หลัก
        document.getElementById('loading-overlay').style.display = 'none';
        
        // ปลดล็อกหรือซ่อนฟังก์ชันตามระดับสิทธิ์ที่ได้รับจริง
        applyRoleRestrictions();
        loadMapData();
        
   } catch (err) {
    // ดึงโปรไฟล์มาโชว์รหัสเพื่อเอาไปกรอกในชีต
    try {
        const profile = await liff.getProfile();
        document.getElementById('loading-text').innerHTML = 
            "🔒 บล็อกสิทธิ์คนนอกกลุ่ม<br>" +
            "กรุณาก๊อปปี้รหัสนี้ไปใส่ในชีตช่องคอลัมน์ D:<br>" +
            `<input type='text' value='${profile.userId}' style='width:90%; padding:8px; margin-top:5px; text-align:center;' readonly onclick='this.select()'>`;
    } catch(e) {
        document.getElementById('loading-text').innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ LINE";
    }
}
}

// 🛠️ ลอจิกสำคัญ: บล็อกหรือซ่อนปุ่มตามสิทธิ์จริงของคนในกลุ่ม
function applyRoleRestrictions() {
    if (currentUserRole !== "VIP") {
        // ถ้าเป็นคนสวนทั่วไป ให้ซ่อนปุ่มดินสอ แผงวาด แผงฟอร์ม และคอลัมน์รายงานทิ้งทั้งหมด
        const style = document.createElement('style');
        style.innerHTML = `
            .vip-only-element { display: none !important; }
            .mapboxgl-ctrl-top-right, .maplibregl-ctrl-top-right { display: none !important; }
            .btn-popup-edit-trigger { display: none !important; }
        `;
        document.head.appendChild(style);
    }
}

// เรียกให้ LIFF เริ่มทำงานทันทีที่เปิดหน้าเว็บขึ้นมา
initLiff();

// --- ผูกลอจิกลากสไลด์ Bottom Sheet เหมือนเดิม ---
const tableSheet = document.getElementById('table-sheet');
const formSheet = document.getElementById('form-sheet');
function setupDragLogic(sheetElem, handleElem) {
    let isDragging = false;
    const startDrag = () => { isDragging = true; };
    const onDrag = (e) => {
        if (!isDragging) return;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let newHeight = window.innerHeight - clientY;
        if (newHeight >= 100 && newHeight <= window.innerHeight * 0.85) sheetElem.style.height = newHeight + 'px';
    };
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('touchmove', onDrag);
    handleElem.addEventListener('mousedown', startDrag);
    handleElem.addEventListener('touchstart', startDrag);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchend', () => isDragging = false);
}
setupDragLogic(tableSheet, document.getElementById('table-drag-handle'));
setupDragLogic(formSheet, document.getElementById('form-drag-handle'));

document.getElementById('table-open-btn').onclick = () => { if(activePopup) activePopup.remove(); formSheet.style.display = 'none'; tableSheet.style.display = 'flex'; tableSheet.style.height = '52vh'; };
document.getElementById('table-close-btn').onclick = () => { tableSheet.style.display = 'none'; resetHighlights(); };
document.getElementById('form-close-btn').onclick = () => { formSheet.style.display = 'none'; resetHighlights(); };

function getGrassColor(pct) { return pct <= 40 ? '#2ecc71' : pct <= 75 ? '#f1c40f' : '#e74c3c'; }

function renderTable() {
    const tbody = document.getElementById('table-tbody');
    const th = document.getElementById('th-dynamic-status');
    const isVip = (currentUserRole === "VIP");
    
    if(viewMode === 'team') {
        th.innerText = "ผู้รับผิดชอบ";
        tbody.innerHTML = globalZonesArray.map((z, i) => `
            <tr id="tr-zone-${i}" onclick="focusOnZoneFromTable(${i}, this)">
                <td><span class="color-dot" style="background:${z.Color || '#2ecc71'}"></span>${z.zone_name}</td>
                <td>${z.Color === '#f1c40f' ? 'ทีมสีเหลือง' : 'ทีมสีเขียว'}</td>
                <td style="text-align:right;" class="vip-only-element" onclick="event.stopPropagation();">
                    <button class="btn-table-report" onclick="triggerReportFromTable(${i})"><i class="fas fa-file-pen"></i></button>
                </td>
            </tr>
        `).join('');
    } else {
        th.innerText = "ความยาวหญ้า";
        tbody.innerHTML = globalZonesArray.map((z, i) => `
            <tr id="tr-zone-${i}" onclick="focusOnZoneFromTable(${i}, this)">
                <td><span class="color-dot" style="background:${getGrassColor(z.current_grass_percentage)}"></span>${z.zone_name}</td>
                <td style="font-weight:bold; color:${getGrassColor(z.current_grass_percentage)}">${z.current_grass_percentage}%</td>
                <td style="text-align:right;" class="vip-only-element" onclick="event.stopPropagation();">
                    <button class="btn-table-report" onclick="triggerReportFromTable(${i})"><i class="fas fa-file-pen"></i></button>
                </td>
            </tr>
        `).join('');
    }
}

function focusOnZoneFromTable(index, element) {
    document.querySelectorAll('#data-table tr').forEach(r => r.classList.remove('selected-row'));
    element.classList.add('selected-row');
    if(activePopup) activePopup.remove();
    const zone = globalZonesArray[index];
    const coords = JSON.parse(zone.coordinates_data);
    let sumLng = 0, sumLat = 0; coords.forEach(c => { sumLng += c[0]; sumLat += c[1]; });
    map.flyTo({ center: [sumLng / coords.length, sumLat / coords.length], zoom: 17.2 });
    tableSheet.style.height = '28vh';
    for(let i=0; i<totalZonesCount; i++) {
        map.setPaintProperty(`layer-zone-${i}`, 'fill-opacity', i === index ? 0.85 : 0.15);
        map.setPaintProperty(`layer-zone-${i}-stroke`, 'line-width', i === index ? 5 : 1);
    }
}

function activateReportingForm(zone, index) {
    selectedZone = zone;
    if(activePopup) activePopup.remove();
    tableSheet.style.display = 'none';
    document.getElementById('form-sheet-title').innerText = `รายงานผล: ${zone.zone_name}`;
    document.getElementById('input-percent').value = '';
    formSheet.style.display = 'flex';
}

function triggerReportFromTable(index) { activateReportingForm(globalZonesArray[index], index); }
window.openFormFromPopup = function(index) { activateReportingForm(globalZonesArray[index], index); }

function resetHighlights() {
    for(let i=0; i<totalZonesCount; i++) {
        if(map.getLayer(`layer-zone-${i}`)) {
            map.setPaintProperty(`layer-zone-${i}`, 'fill-opacity', 0.5);
            map.setPaintProperty(`layer-zone-${i}-stroke`, 'line-width', 2);
        }
    }
}

map.on('click', (e) => {
    const hit = map.queryRenderedFeatures(e.point).some(f => f.layer.id.startsWith('layer-zone-'));
    if(!hit) { resetHighlights(); formSheet.style.display = 'none'; tableSheet.style.display = 'none'; }
});

document.getElementById('btn-submit-data').onclick = async () => {
    const pct = document.getElementById('input-percent').value;
    if(!pct || pct < 0 || pct > 100) { alert("ข้อมูลไม่ถูกต้อง"); return; }
    document.getElementById('btn-submit-data').disabled = true;
    try {
        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({
            action: "reportProgress", zone_id: selectedZone.zone_id, zone_name: selectedZone.zone_name, work_percentage: pct, worker_name: currentUserName
        }) });
        const res = await response.json();
        if(res.status === "success") location.reload();
    } catch(e) { alert("เกิดข้อผิดพลาด"); document.getElementById('btn-submit-data').disabled = false; }
};

// ดึงตำแหน่งเลเยอร์หลักจากชีตมาแสดงผลบนแผ่นดิน
async function loadMapData() {
    try {
        const response = await fetch(`${WEB_APP_URL}?action=getZones`);
        const zones = await response.json();
        globalZonesArray = zones; totalZonesCount = zones.length;
        renderTable();
        
        zones.forEach((zone, index) => {
            const srcId = `source-zone-${index}`;
            const lyrId = `layer-zone-${index}`;
            const coords = JSON.parse(zone.coordinates_data);
            const c = getGrassColor(zone.current_grass_percentage);

            map.addSource(srcId, { 'type': 'geojson', 'data': { 'type': 'Feature', 'geometry': { 'type': 'Polygon', 'coordinates': [coords] } } });
            map.addLayer({ 'id': lyrId, 'type': 'fill', 'source': srcId, 'paint': { 'fill-color': zone.Color || '#2ecc71', 'fill-opacity': 0.5 } });
            map.addLayer({ 'id': `${lyrId}-stroke`, 'type': 'line', 'source': srcId, 'paint': { 'line-color': zone.Color || '#2ecc71', 'line-width': 2 } });
            
            map.on('click', lyrId, (e) => {
                e.stopPropagation();
                const currentGrass = zone.current_grass_percentage;
                const badgeColor = getGrassColor(currentGrass);
                if(activePopup) activePopup.remove();
                
                activePopup = new maplibregl.Popup({ closeButton: true, closeOnClick: false, offset: [0, -5] })
                .setLngLat(e.lngLat)
                .setHTML(`
                    <div class="custom-popup">
                        <h4 class="popup-title">${zone.zone_name}</h4>
                        <div class="popup-grass-text">
                            ระดับความหนาหญ้า: <span class="popup-grass-badge" style="background:${badgeColor}22; color:${badgeColor};">${currentGrass}%</span>
                        </div>
                        <button class="btn-popup-edit-trigger" title="คลิกเพื่อป้อนข้อมูล" onclick="openFormFromPopup(${index})">
                            <i class="fas fa-pencil"></i>
                        </button>
                    </div>
                `)
                .addTo(map);
            });
        });
        updateColors();
    } catch (err) { console.error(err); }
}

document.getElementById('view-mode-btn').onclick = () => {
    if(activePopup) activePopup.remove();
    viewMode = (viewMode === 'team') ? 'grass' : 'team';
    document.getElementById('view-badge').innerText = viewMode === 'team' ? "ทีม" : "หญ้า";
    document.getElementById('view-mode-btn').style.background = viewMode === 'team' ? "#1677FF" : "linear-gradient(135deg, #e74c3c, #c0392b)";
    updateColors(); renderTable(); resetHighlights(); formSheet.style.display = 'none';
};
</script>
</body>
</html>
